<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GetMinted</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1A1A2E;
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  color: #F0F4F8;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Top bar */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-top: max(env(safe-area-inset-top, 16px), 16px);
  padding: 12px 20px 0;
  z-index: 10;
}

.wordmark {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #00C882;
  opacity: 0.7;
  text-transform: uppercase;
}

.login-btn {
  position: absolute;
  right: 20px;
  top: 12px;
  background: none;
  border: none;
  color: #00C882;
  opacity: 0.5;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  padding: 6px 10px;
  letter-spacing: 0.3px;
  transition: opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.login-btn:hover, .login-btn:active {
  opacity: 0.85;
}

/* Character area */
.character-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  position: relative;
  min-height: 0;
  overflow: hidden;
}

/* Speech bubble */
.speech-bubble {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 200, 130, 0.12);
  border: 1px solid rgba(0, 200, 130, 0.25);
  border-radius: 20px;
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 500;
  color: #F0F4F8;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
  opacity: 1;
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 20;
  pointer-events: none;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 14px; height: 14px;
  background: rgba(0, 200, 130, 0.12);
  border-right: 1px solid rgba(0, 200, 130, 0.25);
  border-bottom: 1px solid rgba(0, 200, 130, 0.25);
}
.speech-bubble.pop {
  animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.speech-bubble.hidden { opacity: 0; pointer-events: none; }
@keyframes bubblePop {
  0% { transform: translateX(-50%) scale(0.7); opacity: 0; }
  100% { transform: translateX(-50%) scale(1); opacity: 1; }
}

/* Thinking dots in speech bubble */
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; height: 20px; }
.thinking-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #00C882;
  opacity: 0.4;
  animation: dotPulse 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1.2); }
}

/* Mint wrapper */
#mint-wrapper {
  position: relative;
  width: 160px; height: 176px;
  cursor: grab;
  z-index: 15;
  will-change: transform;
  flex-shrink: 0;
}
#mint-wrapper:active { cursor: grabbing; }

@keyframes idleFloat {
  0%, 100% { transform: translateY(0) rotate(-1.5deg); }
  50% { transform: translateY(-14px) rotate(1.5deg); }
}
#mint-wrapper.idle {
  animation: idleFloat 3s ease-in-out infinite;
}

@keyframes squish {
  0% { transform: scale(1, 1); }
  30% { transform: scale(1.15, 0.85); }
  50% { transform: scale(0.9, 1.1); }
  70% { transform: scale(1.05, 0.95); }
  100% { transform: scale(1, 1); }
}
#mint-svg.squish { animation: squish 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

@keyframes happySpin {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.25) rotate(180deg); }
  100% { transform: scale(1) rotate(360deg); }
}
#mint-svg.spin { animation: happySpin 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }

.mint-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 140px; height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,130,0.2) 0%, transparent 70%);
  filter: blur(20px);
  pointer-events: none;
  z-index: -1;
}

/* Chat section */
.chat-section {
  width: 100%;
  max-width: 420px;
  padding: 0 16px;
  padding-bottom: max(env(safe-area-inset-bottom, 12px), 12px);
  display: flex;
  flex-direction: column;
  z-index: 10;
  flex-shrink: 0;
}

/* Chat history */
.chat-history {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 180px;
  overflow-y: auto;
  padding: 8px 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.chat-history::-webkit-scrollbar { display: none; }

.chat-msg {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  animation: msgSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes msgSlideIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

.chat-msg.mint { justify-content: flex-start; }
.chat-msg.user { justify-content: flex-end; }

.chat-msg .leaf-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(0,200,130,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

.chat-msg .bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.4;
  word-wrap: break-word;
}

.chat-msg.mint .bubble {
  background: #252540;
  color: #F0F4F8;
  border-bottom-left-radius: 6px;
}
.chat-msg.user .bubble {
  background: #00C882;
  color: #1A1A2E;
  border-bottom-right-radius: 6px;
  font-weight: 500;
}

/* Chat input bar */
.chat-input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.chat-input-bar input {
  flex: 1;
  padding: 14px 18px;
  background: #111417;
  border: 2px solid transparent;
  border-radius: 24px;
  color: #F0F4F8;
  font-size: 16px;
  font-weight: 400;
  font-family: inherit;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
}
.chat-input-bar input::placeholder {
  color: #555e68;
}
.chat-input-bar input:focus {
  border-color: #00C882;
  box-shadow: 0 0 0 3px rgba(0, 200, 130, 0.12);
}

.send-btn {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: #00C882;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.send-btn:active { transform: scale(0.9); background: #00b374; }
.send-btn:disabled { opacity: 0.4; cursor: default; }
.send-btn:disabled:active { transform: none; }
.send-btn svg { width: 20px; height: 20px; }

.disclaimer {
  font-size: 12px;
  color: #8A9AA8;
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.2px;
}

/* Particles */
.particle {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00C882;
  pointer-events: none;
  opacity: 0;
  z-index: 5;
}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="wordmark">GetMinted</div>
    <button class="login-btn" onclick="window.location.href='https://getminted.ai/dashboard/'">Log in</button>
  </div>

  <div class="character-zone" id="character-zone">
    <div class="speech-bubble pop" id="speech-bubble">Hey! I'm Mint 🌿 Talk to me!</div>
    <div id="mint-wrapper" class="idle">
      <div class="mint-glow"></div>
      <svg id="mint-svg" viewBox="0 0 200 220" width="200" height="220" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="210" rx="50" ry="8" fill="rgba(0,0,0,0.2)"/>
        <path d="M100 45 Q98 30 102 15" stroke="#00a86b" stroke-width="4" fill="none" stroke-linecap="round"/>
        <ellipse cx="100" cy="120" rx="72" ry="85" fill="#00C882"/>
        <ellipse cx="85" cy="100" rx="35" ry="50" fill="rgba(255,255,255,0.08)" transform="rotate(-10 85 100)"/>
        <path d="M100 50 Q100 120 100 195" stroke="rgba(0,100,65,0.25)" stroke-width="2.5" fill="none"/>
        <path d="M100 80 Q75 100 50 105" stroke="rgba(0,100,65,0.18)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M100 80 Q125 100 150 105" stroke="rgba(0,100,65,0.18)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M100 115 Q70 135 45 145" stroke="rgba(0,100,65,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M100 115 Q130 135 155 145" stroke="rgba(0,100,65,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M100 150 Q78 165 60 175" stroke="rgba(0,100,65,0.12)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M100 150 Q122 165 140 175" stroke="rgba(0,100,65,0.12)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <ellipse id="eye-left" cx="78" cy="110" rx="7" ry="8" fill="#1A1A2E"/>
        <ellipse id="eye-right" cx="122" cy="110" rx="7" ry="8" fill="#1A1A2E"/>
        <circle cx="81" cy="107" r="2.5" fill="rgba(255,255,255,0.7)"/>
        <circle cx="125" cy="107" r="2.5" fill="rgba(255,255,255,0.7)"/>
        <path id="mouth" d="M85 135 Q100 150 115 135" stroke="#1A1A2E" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="62" cy="128" rx="10" ry="6" fill="rgba(255,100,130,0.2)"/>
        <ellipse cx="138" cy="128" rx="10" ry="6" fill="rgba(255,100,130,0.2)"/>
      </svg>
    </div>
  </div>

  <div class="chat-section">
    <div class="chat-history" id="chat-history"></div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Say something to Mint..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12L3 3l19 9-19 9 2-9zm0 0h8" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="disclaimer">Free website from your IG. 30 seconds. No credit card.</div>
  </div>
</div>

<script>
(function() {
  const CONVEX_URL = 'https://curious-lemming-262.convex.site/api/mint/chat';
  let threadId = null;

  const wrapper = document.getElementById('mint-wrapper');
  const svg = document.getElementById('mint-svg');
  const bubble = document.getElementById('speech-bubble');
  const zone = document.getElementById('character-zone');
  const chatInput = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const chatHistory = document.getElementById('chat-history');

  let conversationHistory = [];
  let isSending = false;
  let hasAskedForHandle = false;

  // --- Chat Functions ---

  function addMessage(text, sender) {
    const msgEl = document.createElement('div');
    msgEl.className = `chat-msg ${sender}`;

    if (sender === 'mint') {
      msgEl.innerHTML = `<div class="leaf-icon">🌿</div><div class="bubble">${escapeHtml(text)}</div>`;
    } else {
      msgEl.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    }

    chatHistory.appendChild(msgEl);
    chatHistory.scrollTop = chatHistory.scrollHeight;

    // Trim to last 6 visible messages
    while (chatHistory.children.length > 6) {
      chatHistory.removeChild(chatHistory.firstChild);
    }
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function showThinking() {
    bubble.classList.remove('pop', 'hidden');
    bubble.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';
    void bubble.offsetWidth;
    bubble.classList.add('pop');
  }

  function detectIgHandle(text) {
    // Direct @handle pattern
    const atMatch = text.match(/@([a-zA-Z0-9_.]{1,30})/);
    if (atMatch) return atMatch[1];

    // After Mint has asked for handle, treat single word that looks like username
    if (hasAskedForHandle) {
      const cleaned = text.trim().replace(/^@/, '');
      if (/^[a-zA-Z0-9_.]{2,30}$/.test(cleaned) && !cleaned.includes(' ')) {
        return cleaned;
      }
    }

    return null;
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || isSending) return;

    isSending = true;
    sendBtn.disabled = true;
    chatInput.value = '';

    // Add user message
    addMessage(text, 'user');
    conversationHistory.push({ role: 'user', content: text });

    // Check for IG handle
    const handle = detectIgHandle(text);

    // Show thinking
    showThinking();

    // Squish Mint
    svg.classList.remove('squish', 'spin');
    void svg.offsetWidth;
    svg.classList.add('squish');

    try {
      const resp = await fetch(CONVEX_URL, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          message: text + (handle ? ` (my instagram handle is @${handle})` : ''),
          context: 'getminted',
          threadId: threadId
        })
      });

      // Persist thread ID for conversation continuity
      const newThreadId = resp.headers.get('X-Thread-Id');
      if (newThreadId) threadId = newThreadId;

      const reply = (await resp.text()) || "Hmm, my brain glitched. Try again? 😅";

      conversationHistory.push({ role: 'assistant', content: reply });

      // Track if Mint has asked for handle (check reply for handle-asking patterns)
      if (/handle|instagram|ig |@|username|what'?s your/i.test(reply)) {
        hasAskedForHandle = true;
      }

      // Show reply
      addMessage(reply, 'mint');
      showBubble(reply.length > 50 ? reply.slice(0, 47) + '...' : reply);

      // If handle detected, redirect after delay
      if (handle) {
        spawnParticles(12);
        svg.classList.remove('squish', 'spin');
        void svg.offsetWidth;
        svg.classList.add('spin');

        setTimeout(() => {
          showBubble("Building your site... 🚀");
        }, 1500);

        setTimeout(() => {
          window.location.href = 'https://getminted.ai/dashboard/';
        }, 2800);
      }

    } catch (err) {
      console.error('API error:', err);
      const fallback = "Oops, bad signal! Try that again? 📡";
      addMessage(fallback, 'mint');
      showBubble(fallback);
    }

    isSending = false;
    sendBtn.disabled = false;
    resetIdle();
  }

  // Send on button click or Enter
  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // --- Speech Bubble ---
  function showBubble(text) {
    bubble.classList.remove('pop', 'hidden');
    bubble.textContent = text;
    void bubble.offsetWidth;
    bubble.classList.add('pop');
  }

  // --- Idle Timer ---
  let idleTimer = null;
  const nudges = [
    "Go ahead, type something! 👇",
    "Don't be shy, I don't bite 🌿",
    "I'm here whenever you're ready 💚"
  ];
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      if (!isDragging && conversationHistory.length === 0) {
        showBubble(pick(nudges));
      }
    }, 5000);
  }
  resetIdle();

  // --- Spring Physics & Drag (unchanged from v1) ---
  let posX = 0, posY = 0;
  let velX = 0, velY = 0;
  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragOffsetX = 0, dragOffsetY = 0;
  let animating = false;

  function applyTransform() {
    wrapper.style.transform = `translate(${posX}px, ${posY}px)`;
  }

  const springK = 0.12;
  const damping = 0.75;

  function springAnimate() {
    if (isDragging) { animating = false; return; }
    const ax = -springK * posX;
    const ay = -springK * posY;
    velX = (velX + ax) * damping;
    velY = (velY + ay) * damping;
    posX += velX;
    posY += velY;

    if (Math.abs(posX) < 0.3 && Math.abs(posY) < 0.3 && Math.abs(velX) < 0.3 && Math.abs(velY) < 0.3) {
      posX = 0; posY = 0;
      applyTransform();
      animating = false;
      wrapper.classList.add('idle');
      return;
    }
    applyTransform();
    requestAnimationFrame(springAnimate);
  }

  function startSpring() {
    if (!animating) { animating = true; requestAnimationFrame(springAnimate); }
  }

  function getXY(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  let lastTapTime = 0;
  let tapTimer = null;

  function handleTapStart(e) {
    if (e.target === chatInput || e.target === sendBtn || e.target.closest('.send-btn') || e.target.closest('.login-btn')) return;
    const { x, y } = getXY(e);
    dragStartX = x; dragStartY = y;
    dragOffsetX = posX; dragOffsetY = posY;
    isDragging = true;
    wrapper.classList.remove('idle');
  }

  function handleTapMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const { x, y } = getXY(e);
    posX = dragOffsetX + (x - dragStartX);
    posY = dragOffsetY + (y - dragStartY);
    applyTransform();
  }

  function handleTapEnd(e) {
    if (!isDragging) return;
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = Math.abs(pt.clientX - dragStartX);
    const dy = Math.abs(pt.clientY - dragStartY);
    isDragging = false;

    if (dx < 10 && dy < 10) {
      const now = Date.now();
      if (now - lastTapTime < 300) {
        clearTimeout(tapTimer);
        doDoubleTap();
        lastTapTime = 0;
      } else {
        lastTapTime = now;
        tapTimer = setTimeout(() => { doSingleTap(); lastTapTime = 0; }, 300);
      }
    }
    startSpring();
    resetIdle();
  }

  function doSingleTap() {
    svg.classList.remove('squish', 'spin');
    void svg.offsetWidth;
    svg.classList.add('squish');
    const tapMsgs = ["Hehe, that tickles! 😆", "Type something below! 👇", "Let's chat! Ask me anything 🌿"];
    showBubble(pick(tapMsgs));
    spawnParticles(4);
    resetIdle();
  }

  function doDoubleTap() {
    svg.classList.remove('squish', 'spin');
    void svg.offsetWidth;
    svg.classList.add('spin');
    showBubble("Let's GOOO! 🔥");
    spawnParticles(8);
    resetIdle();
  }

  function spawnParticles(count) {
    const rect = wrapper.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 60 + Math.random() * 50;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const size = 4 + Math.random() * 5;
      p.style.width = size + 'px'; p.style.height = size + 'px';
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.opacity = '1';
      p.style.transition = `all ${0.4 + Math.random() * 0.3}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
      document.body.appendChild(p);
      requestAnimationFrame(() => { p.style.transform = `translate(${tx}px, ${ty}px)`; p.style.opacity = '0'; });
      setTimeout(() => p.remove(), 800);
    }
  }

  // Event listeners
  wrapper.addEventListener('touchstart', handleTapStart, { passive: true });
  wrapper.addEventListener('touchmove', handleTapMove, { passive: false });
  wrapper.addEventListener('touchend', handleTapEnd, { passive: true });
  wrapper.addEventListener('mousedown', handleTapStart);
  document.addEventListener('mousemove', handleTapMove);
  document.addEventListener('mouseup', handleTapEnd);

  svg.addEventListener('animationend', () => { svg.classList.remove('squish', 'spin'); });

  // Layout bubble above character
  function layoutBubble() {
    const zoneRect = zone.getBoundingClientRect();
    const wrapperRect = wrapper.getBoundingClientRect();
    const bubbleTop = wrapperRect.top - zoneRect.top - 55;
    bubble.style.top = Math.max(5, bubbleTop) + 'px';
  }
  layoutBubble();
  window.addEventListener('resize', layoutBubble);
  setInterval(layoutBubble, 200);

  // Focus input → focus handling for keyboard on mobile
  chatInput.addEventListener('focus', () => {
    resetIdle();
  });

})();
</script>
</body>
</html>
