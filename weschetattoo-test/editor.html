<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--mint:#98E8C1;--bg:#0a0a0a;--header:#111;--msg-user:#2a2a2a;--msg-bot:#1a1a1a;--input-bg:#151515;--border:#222}
html,body{height:100%;background:var(--bg);color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh}
.header{background:var(--header);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header svg{width:28px;height:28px;flex-shrink:0}
.header h1{color:var(--mint);font-size:18px;font-weight:600}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;scroll-behavior:smooth}
.chat-inner{max-width:700px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:12px;flex:1}
.msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.6;animation:msgIn .25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;background:var(--msg-bot);border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:var(--msg-user);border-bottom-right-radius:4px}
.msg .label{color:var(--mint);font-size:11px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.quick-btn{background:transparent;border:1px solid var(--mint);color:var(--mint);padding:8px 16px;border-radius:20px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s}
.quick-btn:hover{background:var(--mint);color:#0a0a0a}
.typing{align-self:flex-start;display:flex;gap:4px;padding:12px 16px;display:none}
.typing.active{display:flex}
.typing span{width:7px;height:7px;background:var(--mint);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.input-bar{flex-shrink:0;padding:12px 16px;border-top:1px solid var(--border);background:var(--header)}
.input-wrap{max-width:700px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.input-wrap textarea{flex:1;background:var(--input-bg);border:1px solid #333;border-radius:12px;padding:12px 16px;color:#e0e0e0;font-size:15px;font-family:'Inter',sans-serif;resize:none;outline:none;max-height:120px;line-height:1.4}
.input-wrap textarea:focus{border-color:rgba(152,232,193,.4)}
.input-wrap textarea::placeholder{color:#555}
.send-btn{width:44px;height:44px;background:var(--mint);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:disabled{opacity:.3;cursor:default}
.send-btn svg{width:20px;height:20px}
.drop-overlay{position:fixed;inset:0;background:rgba(10,10,10,.92);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.drop-overlay.active{display:flex}
.drop-zone{border:2px dashed var(--mint);border-radius:20px;padding:60px 80px;text-align:center}
.drop-zone p{color:var(--mint);font-size:18px;font-weight:600}
.drop-zone span{color:#666;font-size:14px}
.file-input{display:none}
@media(max-width:600px){.msg{max-width:90%}.quick-actions{gap:6px}.quick-btn{padding:6px 12px;font-size:12px}.drop-zone{padding:40px 30px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <svg viewBox="0 0 40 40" fill="none"><path d="M20 4L35 12V28L20 36L5 28V12L20 4Z" stroke="#98E8C1" stroke-width="1.5" fill="none"/><path d="M20 10L29 15V25L20 30L11 25V15L20 10Z" stroke="#98E8C1" stroke-width="1" fill="none" opacity=".5"/><circle cx="20" cy="20" r="3" fill="#98E8C1" opacity=".6"/></svg>
    <h1>Mint</h1>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner">
      <div class="msg bot">
        <div class="label">Mint</div>
        Hey! 👋 What would you like to change on your site today?
        <div class="quick-actions">
          <button class="quick-btn" data-action="upload">📷 Upload Photos</button>
          <button class="quick-btn" data-action="bio">✏️ Edit Bio</button>
          <button class="quick-btn" data-action="booking">🔗 Change Booking Link</button>
          <button class="quick-btn" data-action="colors">🎨 Update Colors</button>
        </div>
      </div>
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Tell Mint what to change..." autocomplete="off"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#0a0a0a"/></svg>
      </button>
    </div>
  </div>
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-zone">
      <p>📷 Drop photos here</p>
      <span>JPG or PNG, up to 20MB each</span>
    </div>
  </div>
  <input type="file" class="file-input" id="fileInput" multiple accept="image/jpeg,image/png">
</div>

<script>
const API = 'https://api.bayouwebstudio.com/api/mint/edit';
const UPLOAD_API = 'https://api.bayouwebstudio.com/api/mint/upload';
const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');
if (!TOKEN) document.body.innerHTML = '<div style="display:flex;height:100vh;align-items:center;justify-content:center;color:#666;font-family:Inter,sans-serif;font-size:16px">Missing token. Check your link.</div>';

const chatArea = document.getElementById('chatArea');
const chatInner = document.getElementById('chatInner');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const typing = document.getElementById('typing');
const dropOverlay = document.getElementById('dropOverlay');
const fileInput = document.getElementById('fileInput');
let history = [];
let sending = false;

function scrollBottom() {
  requestAnimationFrame(() => chatArea.scrollTop = chatArea.scrollHeight);
}

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  if (role === 'bot') d.innerHTML = `<div class="label">Mint</div>${text.replace(/\n/g,'<br>')}`;
  else d.textContent = text;
  chatInner.insertBefore(d, typing);
  scrollBottom();
}

async function send(text) {
  if (!text.trim() || sending) return;
  sending = true;
  addMsg('user', text);
  history.push({role:'user', content: text});
  input.value = '';
  autoResize();
  sendBtn.disabled = true;
  typing.classList.add('active');
  scrollBottom();

  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, token: TOKEN, history: history.slice(-20)})
    });
    const data = await r.json();
    typing.classList.remove('active');
    if (data.reply) {
      addMsg('bot', data.reply);
      history.push({role:'assistant', content: data.reply});
    } else {
      addMsg('bot', data.error || 'Something went wrong. Try again.');
    }
  } catch(e) {
    typing.classList.remove('active');
    addMsg('bot', 'Connection error. Please try again.');
  }
  sending = false;
  sendBtn.disabled = !input.value.trim();
}

async function uploadFiles(files) {
  if (!files.length) return;
  typing.classList.add('active');
  addMsg('user', `Uploading ${files.length} photo${files.length>1?'s':''}...`);
  const fd = new FormData();
  fd.append('token', TOKEN);
  for (const f of files) fd.append('files', f);
  try {
    const r = await fetch(UPLOAD_API, {method:'POST', body: fd});
    const data = await r.json();
    typing.classList.remove('active');
    addMsg('bot', data.message || 'Upload complete!');
  } catch(e) {
    typing.classList.remove('active');
    addMsg('bot', 'Upload failed. Please try again.');
  }
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}
input.addEventListener('input', () => { autoResize(); sendBtn.disabled = !input.value.trim(); });
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); } });
sendBtn.addEventListener('click', () => send(input.value));

document.querySelectorAll('.quick-btn').forEach(b => {
  b.addEventListener('click', () => {
    const map = { upload: null, bio: "I want to update my bio/about section", booking: "I need to change my booking link", colors: "I want to change my site's accent color" };
    const action = b.dataset.action;
    if (action === 'upload') { fileInput.click(); return; }
    if (map[action]) send(map[action]);
    document.querySelector('.quick-actions')?.remove();
  });
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) { uploadFiles(Array.from(fileInput.files)); document.querySelector('.quick-actions')?.remove(); }
});

let dragCount = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCount++; dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dragCount--; if(dragCount<=0){dragCount=0;dropOverlay.classList.remove('active');} });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dragCount=0; dropOverlay.classList.remove('active');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) uploadFiles(files);
});

if (TOKEN) {
  fetch(`https://api.bayouwebstudio.com/api/mint/site-info?token=${TOKEN}`)
    .then(r=>r.json()).then(d=>{if(d.site_name)document.title=`Mint — ${d.site_name}`;}).catch(()=>{});
}
</script>
</body>
</html>
