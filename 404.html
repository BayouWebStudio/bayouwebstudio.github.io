<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eterno Web Studio</title>
  <script>
    // Handle /claim/slug → /dashboard/?claim=slug
    var path = window.location.pathname;
    var m = path.match(/^\/claim\/([^\/]+)\/?$/);
    if (m) {
      window.location.replace('https://getminted.ai/dashboard/?claim=' + m[1]);
    } else {
      // Generic 404 — just send home
      window.location.replace('https://getminted.ai');
    }
  </script>
</head>
<body></body>
</html>
