<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eterno Web Studio</title>
  <script>
    var path = window.location.pathname;
    var m = path.match(/^\/claim\/([^\/]+)\/?$/);
    if (m) {
      window.location.replace('https://dashboard.eternowebstudio.com/?claim=' + m[1]);
    }
    // Otherwise: do nothing, show 404 page
  </script>
</head>
<body>
  <h1>Page not found</h1>
  <p>The page you requested does not exist.</p>
</body>
</html>
