<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GetMinted">
<meta name="theme-color" content="#00c882">
<meta name="description" content="GetMinted — Your AI-powered website dashboard">
<title>GetMinted</title>
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/mint-preview/icon-192.png">
<link rel="icon" type="image/png" href="/mint-preview/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --text-dim: rgba(255,255,255,0.45);
  --mint: #00c882;
  --mint-dim: rgba(0,200,130,0.1);
  --mint-border: rgba(0,200,130,0.2);
  --radius: 12px;
  --radius-sm: 8px;
  --nav-height: 64px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* Auth screen */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Auth screen (Clerk sign-in/up) */
#auth-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; height: 100%;
  padding: max(env(safe-area-inset-top,20px),20px) 24px 24px;
  overflow-y: auto;
}
.auth-back {
  align-self: flex-start; background: none; border: none;
  color: var(--mint); font-size: 14px; font-family: inherit;
  cursor: pointer; padding: 0 0 16px; display: flex; align-items: center; gap: 6px;
}
.auth-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.auth-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
#clerk-mount { width: 100%; max-width: 400px; }

/* App shell */
#app-shell { display: none; height: 100%; flex-direction: column; }
#app-shell.active { display: flex; }
#boot-loading { position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999; }
#boot-loading .boot-logo { font-size:48px; animation: pulse 1.5s ease-in-out infinite; }
#boot-loading .boot-text { color:rgba(255,255,255,0.45);font-size:14px; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Tab content area */
.tab-content {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding-top: var(--safe-top);
}
.tab-pane {
  display: none;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-pane.active { display: block; }
.tab-pane iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Bottom nav */
.bottom-nav {
  display: flex;
  align-items: center;
  justify-content: space-around;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  height: var(--nav-height);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 500;
  user-select: none;
}
.nav-item.active { color: var(--mint); }
.nav-item svg { width: 24px; height: 24px; }

/* Install banner */
#install-banner {
  display: none;
  position: fixed;
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 12px);
  left: 16px; right: 16px;
  background: var(--surface);
  border: 1px solid var(--mint-border);
  border-radius: var(--radius);
  padding: 14px 16px;
  z-index: 200;
  flex-direction: row;
  align-items: center;
  gap: 12px;
}
#install-banner.show { display: flex; }
#install-banner .install-text { flex: 1; font-size: 13px; }
#install-banner .install-text strong { color: var(--mint); }
#install-btn {
  background: var(--mint);
  color: #080808;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}
#install-dismiss {
  background: none; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer; padding: 4px;
}

/* Home tab */
.home-scroll { padding: 20px 16px 24px; }
.home-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.home-header h2 { font-size: 22px; font-weight: 700; }
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: var(--mint);
  overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* Site preview card */
.site-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.site-preview {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--surface2);
  position: relative;
  overflow: hidden;
}
.site-preview img {
  width: 100%; height: 100%; object-fit: cover;
}
.site-preview .placeholder {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  color: var(--text-dim); font-size: 14px;
}
.site-card-body { padding: 14px 16px; }
.site-domain {
  font-size: 15px; font-weight: 600;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.site-domain a {
  color: var(--text); text-decoration: none;
}
.site-domain a:hover { color: var(--mint); }
.live-dot {
  width: 8px; height: 8px;
  background: var(--mint);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Stats row */
.stats-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-chip {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.stat-chip .label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.stat-chip .value {
  font-size: 15px;
  font-weight: 600;
}
.stat-chip .value.mint { color: var(--mint); }

/* Quick actions */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.action-btn {
  background: var(--mint-dim);
  border: 1px solid var(--mint-border);
  border-radius: var(--radius-sm);
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s;
  color: var(--text);
  text-decoration: none;
  display: block;
}
.action-btn:active { background: rgba(0,200,130,0.2); }
.action-btn .icon { font-size: 20px; margin-bottom: 4px; }
.action-btn .label { font-size: 11px; font-weight: 500; }

/* Section heading */
.section-heading {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

/* Activity feed */
.activity-feed { display: flex; flex-direction: column; gap: 8px; }
.activity-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.activity-item .emoji { font-size: 18px; flex-shrink: 0; }
.activity-item .msg { flex: 1; color: var(--text); }
.activity-item .time { color: var(--text-dim); font-size: 11px; white-space: nowrap; }

/* Settings tab */
.settings-scroll { padding: 20px 16px 24px; }
.settings-scroll h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
.settings-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.settings-card .label {
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.settings-card .value { font-size: 15px; font-weight: 500; }
.plan-badge {
  display: inline-block;
  background: var(--mint-dim);
  color: var(--mint);
  border: 1px solid var(--mint-border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 600;
}
.settings-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  color: var(--text);
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.settings-link .arrow { color: var(--text-dim); }
.logout-btn {
  width: 100%;
  background: none;
  border: 1px solid rgba(255,60,60,0.3);
  border-radius: var(--radius);
  color: #ff4444;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 24px;
  font-family: inherit;
}
.logout-btn:active { background: rgba(255,60,60,0.1); }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--mint);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_live_Y2xlcmsuZ2V0bWludGVkLmFpJA"
  src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"

></script>

<script>
(function() {
  // State
  let currentTab = 'chat';
  let siteData = null;
  let iframesLoaded = { edit: false, chat: false };

  function hideBoot() {
    const el = document.getElementById('boot-loading');
    if (el) el.style.display = 'none';
  }

  function showLanding() {
    document.getElementById('landing-page').style.display = 'flex';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('guest-chat').style.display = 'none';
    document.getElementById('app-shell').classList.remove('active');
  }

  function showGuestChat() {
    document.getElementById('landing-page').style.display = 'none';
    document.getElementById('guest-chat').style.display = 'flex';
  }

  function showAuthScreen(mode) {
    document.getElementById('landing-page').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    const title = document.getElementById('auth-title');
    if (title) title.textContent = mode === 'signup' ? 'Create Account' : 'Sign In';
    const sub = document.querySelector('.auth-sub');
    if (sub) sub.textContent = mode === 'signup' ? 'Get your site built in 60 seconds' : 'Welcome back to GetMinted';
    const mount = document.getElementById('clerk-mount');
    mount.innerHTML = '';
    if (mode === 'signup') {
      window.Clerk.mountSignUp(mount, { appearance: clerkAppearance });
    } else {
      window.Clerk.mountSignIn(mount, { appearance: clerkAppearance });
    }
  }

  const clerkAppearance = {
    variables: {
      colorPrimary: '#00c882', colorBackground: '#0f0f0f',
      colorText: '#f0f0f0', colorInputBackground: '#1a1a1a', colorInputText: '#f0f0f0',
      borderRadius: '12px',
    },
    elements: {
      card: { backgroundColor: '#0f0f0f', border: '1px solid rgba(255,255,255,0.08)', boxShadow: 'none' },
      headerTitle: { color: '#f0f0f0' }, headerSubtitle: { color: 'rgba(255,255,255,0.45)' },
      socialButtonsBlockButton: { backgroundColor: '#1a1a1a', border: '1px solid rgba(255,255,255,0.08)', color: '#f0f0f0' },
      formFieldInput: { backgroundColor: '#1a1a1a', border: '1px solid rgba(255,255,255,0.08)', color: '#f0f0f0' },
      footerActionLink: { color: '#00c882' },
    }
  };

  // Clerk init — poll until Clerk is ready (handles async script loading)
  var _clerkReady = false;
  async function initClerk() {
    if (_clerkReady) return;
    _clerkReady = true;
    try {
      await window.Clerk.load();
      hideBoot();
      if (window.Clerk.user) {
        showApp();
      } else {
        showLanding();
        window.Clerk.addListener(({ user }) => {
          if (user) showApp();
        });
      }
    } catch(e) {
      console.error('Clerk init error:', e);
      hideBoot();
      showLanding();
    }
  }

  // Try immediately, then poll, then hard timeout
  var _pollCount = 0;
  var _poll = setInterval(function() {
    _pollCount++;
    if (window.Clerk) { clearInterval(_poll); initClerk(); }
    else if (_pollCount > 40) { clearInterval(_poll); hideBoot(); showLanding(); } // 4s timeout
  }, 100);

  window.addEventListener('load', function() {
    if (window.Clerk && !_clerkReady) { clearInterval(_poll); initClerk(); }
  });

  function showAuth() { showLanding(); }

  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('landing-page').style.display = 'none';
    document.getElementById('app-shell').classList.add('active');
    switchTab('chat'); // default to Mint chat
  }

  function renderSiteData() {
    if (!siteData) return;
    const { siteSlug, domain, domainStatus, plan } = siteData;
    const liveUrl = domain ? ('https://' + domain) : ('https://getminted.ai/' + siteSlug);

    // Show content, hide loading
    document.getElementById('home-loading').style.display = 'none';
    document.getElementById('home-content').style.display = 'block';

    // Site link
    const linkEl = document.getElementById('site-link');
    linkEl.textContent = domain || ('getminted.ai/' + siteSlug);
    linkEl.href = liveUrl;

    // Open site button
    document.getElementById('btn-open-site').href = liveUrl;

    // Plan badge
    const planLabel = (plan || 'free').charAt(0).toUpperCase() + (plan || 'free').slice(1);
    document.getElementById('stat-plan-badge').textContent = planLabel + ' Plan';

    // Status
    const statusEl = document.getElementById('stat-status');
    statusEl.textContent = domainStatus === 'active' ? '● Live' : '● Active';
    statusEl.style.color = '#00c882';

    // Preview image
    const previewEl = document.getElementById('site-preview');
    const img = new Image();
    img.onload = () => { previewEl.innerHTML = ''; previewEl.appendChild(img); img.style.cssText = 'width:100%;height:100%;object-fit:cover;'; };
    img.onerror = () => { previewEl.innerHTML = '<div class="placeholder" style="font-size:48px;opacity:0.15;">🌿</div>'; };
    img.src = 'https://getminted.ai/' + siteSlug + '/?nocache=' + Date.now();

    // Settings tab
    document.getElementById('settings-plan').textContent = planLabel;
    document.getElementById('settings-domain').textContent = domain || ('getminted.ai/' + siteSlug);
    document.getElementById('settings-slug').textContent = siteSlug || '—';
  }

  // Tab switching
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelector('[data-tab="' + tab + '"]').classList.add('active');

    // Lazy-load iframes
    if (tab === 'edit' && !iframesLoaded.edit) {
      iframesLoaded.edit = true;
      document.getElementById('tab-edit').innerHTML =
        '<iframe src="/dashboard/" title="Dashboard" allow="clipboard-write"></iframe>';
    }
    if (tab === 'chat' && !iframesLoaded.chat) {
      iframesLoaded.chat = true;
      document.getElementById('tab-chat').innerHTML =
        '<iframe src="/mint-preview/" title="Mint AI Chat"></iframe>';
    }
  }

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => switchTab(item.dataset.tab));
  });

  // Logout
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await window.Clerk.signOut();
    location.reload();
  });

  // Billing
  document.getElementById('billing-link').addEventListener('click', (e) => {
    e.preventDefault();
    // Open Stripe portal (placeholder - would need actual portal URL from API)
    window.open('https://billing.stripe.com/p/login/test', '_blank');
  });

  // Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').classList.add('show');
  });
  document.getElementById('install-btn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
    document.getElementById('install-banner').classList.remove('show');
  });
  document.getElementById('install-dismiss').addEventListener('click', () => {
    document.getElementById('install-banner').classList.remove('show');
  });

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/app/sw.js').catch(e => console.warn('SW reg failed:', e));
  }
})();
</script>
</body>
</html>
