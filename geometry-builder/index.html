<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Sacred Geometry Builder</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--gold:#C9A84C;--violet:#7B2FBE;--teal:#2FBEC9;--text:#e0e0e0;--text2:#888;--radius:8px}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',sans-serif;background:var(--bg);color:var(--text);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input[type=range]{-webkit-appearance:none;background:var(--surface2);height:6px;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}
input[type=color]{-webkit-appearance:none;border:2px solid var(--border);border-radius:var(--radius);width:36px;height:36px;padding:2px;background:var(--surface);cursor:pointer}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:4px}
select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;outline:none}
.app{display:flex;height:100vh;height:100dvh}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;min-width:0}
.canvas-wrap{position:relative;aspect-ratio:1;max-width:100%;max-height:100%;background:#050505;border:1px solid var(--border);border-radius:4px;overflow:hidden}
#mainCanvas{display:block;width:100%;height:100%}
.mode-label{position:absolute;top:10px;left:10px;background:rgba(10,10,10,.85);color:var(--gold);font-size:11px;padding:4px 10px;border-radius:12px;letter-spacing:1px;text-transform:uppercase;pointer-events:none}
.panel{width:320px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-scroll{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.panel-scroll::-webkit-scrollbar{width:6px}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.section{margin-bottom:16px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin-bottom:8px;font-weight:600}
.shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.shape-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--radius);background:var(--surface2);border:2px solid transparent;font-size:10px;color:var(--text2);transition:all .15s}
.shape-btn:hover{border-color:var(--border);color:var(--text)}
.shape-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1708}
.shape-btn svg{width:24px;height:24px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ctrl-row label{font-size:12px;color:var(--text2);min-width:70px;flex-shrink:0}
.ctrl-row input[type=range]{flex:1}
.ctrl-row .val{font-size:12px;color:var(--text);min-width:32px;text-align:right;font-variant-numeric:tabular-nums}
.color-presets{display:flex;gap:6px;margin-top:6px}
.color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:border-color .15s}
.color-swatch:hover,.color-swatch.active{border-color:var(--gold)}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.toggle{position:relative;width:42px;height:24px;background:var(--surface2);border-radius:12px;cursor:pointer;border:1px solid var(--border);flex-shrink:0}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}
.btn{padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s;text-align:center}
.btn-gold{background:var(--gold);color:#0a0a0a;font-weight:600}
.btn-gold:hover{background:#d4b35a}
.btn-outline{border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{border:1px solid #4a1a1a;color:#e05555}
.btn-danger:hover{background:#2a1010;border-color:#e05555}
.btn-row{display:flex;gap:6px;margin-bottom:8px}
.btn-row .btn{flex:1}
.layers-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.layer-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius);border:2px solid transparent;cursor:pointer;font-size:12px;transition:all .15s}
.layer-item:hover{border-color:var(--border)}
.layer-item.selected{border-color:var(--gold);background:#1a1708}
.layer-item .layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .layer-vis{width:20px;height:20px;display:flex;align-items:center;justify-content:center;opacity:.5;font-size:14px}
.layer-item .layer-vis:hover{opacity:1}
.layer-item .layer-vis.hidden{opacity:.25}
.mode-toggle{display:flex;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.mode-toggle button{flex:1;padding:8px;font-size:12px;background:var(--surface2);color:var(--text2);border-right:1px solid var(--border);font-weight:500}
.mode-toggle button:last-child{border-right:none}
.mode-toggle button.active{background:var(--gold);color:#0a0a0a;font-weight:600}
.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.presets-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.preset-btn{padding:8px 4px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);font-size:10px;color:var(--text2);text-align:center;transition:all .15s;line-height:1.2}
.preset-btn:hover{border-color:var(--gold);color:var(--gold)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:12px 6px;font-size:11px;text-align:center;color:var(--text2);border-bottom:2px solid transparent;font-weight:500;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Generate tab styles */
.gen-dial{display:flex;align-items:center;gap:8px;margin-bottom:12px;position:relative}
.gen-dial label{font-size:12px;color:var(--text2);min-width:72px;flex-shrink:0}
.gen-dial input[type=range]{flex:1}
.gen-dial .val{font-size:12px;color:var(--text);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}
.gen-dial .lock-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:all .15s;padding:0;line-height:1}
.gen-dial .lock-btn.locked{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.gen-dial .lock-btn:hover{border-color:var(--gold)}
.gen-randomize{margin-bottom:12px}
.gen-color-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.gen-color-row label{font-size:12px;color:var(--text2);min-width:72px;flex-shrink:0}

@media(max-width:768px){
  .app{flex-direction:column}
  .canvas-area{flex:none;height:50vh;height:50dvh}
  .panel{width:100%;border-left:none;border-top:1px solid var(--border);flex:1}
  .tab{font-size:10px;padding:10px 4px}
}
@media(max-width:480px){
  .shape-grid{grid-template-columns:repeat(3,1fr)}
  .presets-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="app">
  <div class="canvas-area">
    <div class="canvas-wrap" id="canvasWrap">
      <svg id="mainCanvas" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <rect width="800" height="800" fill="#050505"/>
        <g id="svgLayers"></g>
        <g id="svgGenLayer"></g>
      </svg>
      <div class="mode-label" id="modeLabel">Canvas</div>
    </div>
  </div>
  <div class="panel">
    <div class="tabs">
      <button class="tab active" data-tab="controls">Controls</button>
      <button class="tab" data-tab="generate">⚡ Generate</button>
      <button class="tab" data-tab="layers">Layers</button>
      <button class="tab" data-tab="presets">Presets</button>
      <button class="tab" data-tab="export">Export</button>
    </div>
    <div class="panel-scroll">

      <!-- CONTROLS TAB -->
      <div class="tab-content active" id="tab-controls">
        <div class="section">
          <div class="section-title">Shape</div>
          <div class="shape-grid" id="shapeGrid">
            <button class="shape-btn active" data-shape="circle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg>Circle
            </button>
            <button class="shape-btn" data-shape="polygon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 22,18 2,18"/></svg>Polygon
            </button>
            <button class="shape-btn" data-shape="star">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16,14 18,22 12,17 6,22 8,14 2,9 9,9"/></svg>Star
            </button>
            <button class="shape-btn" data-shape="line">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="20" x2="20" y2="4"/></svg>Line
            </button>
            <button class="shape-btn" data-shape="flower">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="6" r="4"/><circle cx="17" cy="9" r="4"/><circle cx="17" cy="15" r="4"/><circle cx="12" cy="18" r="4"/><circle cx="7" cy="15" r="4"/><circle cx="7" cy="9" r="4"/></svg>Flower
            </button>
            <button class="shape-btn" data-shape="metatron">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="6" cy="8.5" r="2"/><circle cx="18" cy="8.5" r="2"/><circle cx="6" cy="15.5" r="2"/><circle cx="18" cy="15.5" r="2"/></svg>Metatron
            </button>
          </div>
        </div>

        <div class="section" id="sidesSection">
          <div class="ctrl-row">
            <label>Sides</label>
            <input type="range" id="sides" min="3" max="12" value="6" step="1">
            <span class="val" id="sidesVal">6</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Transform</div>
          <div class="ctrl-row">
            <label>Symmetry</label>
            <input type="range" id="symmetry" min="1" max="16" value="1" step="1">
            <span class="val" id="symmetryVal">1</span>
          </div>
          <div class="ctrl-row">
            <label>Radius</label>
            <input type="range" id="radius" min="10" max="380" value="150">
            <span class="val" id="radiusVal">150</span>
          </div>
          <div class="ctrl-row">
            <label>Rotation</label>
            <input type="range" id="rotation" min="0" max="360" value="0">
            <span class="val" id="rotationVal">0°</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Stroke</div>
          <div class="ctrl-row">
            <label>Weight</label>
            <input type="range" id="strokeWeight" min="0.5" max="10" value="1.5" step="0.5">
            <span class="val" id="strokeWeightVal">1.5</span>
          </div>
          <div class="ctrl-row">
            <label>Color</label>
            <input type="color" id="strokeColor" value="#C9A84C">
          </div>
          <div class="color-presets" id="strokePresets">
            <div class="color-swatch active" style="background:#C9A84C" data-color="#C9A84C"></div>
            <div class="color-swatch" style="background:#7B2FBE" data-color="#7B2FBE"></div>
            <div class="color-swatch" style="background:#ffffff" data-color="#ffffff"></div>
            <div class="color-swatch" style="background:#2FBEC9" data-color="#2FBEC9"></div>
            <div class="color-swatch" style="background:#e05555" data-color="#e05555"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Fill</div>
          <div class="toggle-row">
            <div class="toggle" id="fillToggle"></div>
            <span style="font-size:12px;color:var(--text2)">Enable fill</span>
          </div>
          <div class="ctrl-row" id="fillColorRow" style="display:none">
            <label>Fill color</label>
            <input type="color" id="fillColor" value="#C9A84C">
          </div>
        </div>

        <div class="section">
          <div class="ctrl-row">
            <label>Opacity</label>
            <input type="range" id="opacity" min="0.05" max="1" value="1" step="0.05">
            <span class="val" id="opacityVal">100%</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">View</div>
          <div class="mode-toggle" id="modeToggle">
            <button class="active" data-mode="canvas">Canvas</button>
            <button data-mode="tile">Tile</button>
          </div>
        </div>
      </div>

      <!-- GENERATE TAB -->
      <div class="tab-content" id="tab-generate">
        <div class="section">
          <div class="section-title">⚡ Generative Dials</div>
          <div class="gen-dial">
            <label>Symmetry</label>
            <input type="range" id="genSymmetry" min="2" max="24" value="6" step="1">
            <span class="val" id="genSymmetryVal">6</span>
            <button class="lock-btn" data-dial="genSymmetry" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Complexity</label>
            <input type="range" id="genComplexity" min="1" max="8" value="3" step="1">
            <span class="val" id="genComplexityVal">3</span>
            <button class="lock-btn" data-dial="genComplexity" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Frequency</label>
            <input type="range" id="genFrequency" min="1" max="12" value="4" step="1">
            <span class="val" id="genFrequencyVal">4</span>
            <button class="lock-btn" data-dial="genFrequency" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Radius</label>
            <input type="range" id="genRadius" min="40" max="380" value="200">
            <span class="val" id="genRadiusVal">200</span>
            <button class="lock-btn" data-dial="genRadius" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Rotation</label>
            <input type="range" id="genRotation" min="0" max="360" value="0">
            <span class="val" id="genRotationVal">0°</span>
            <button class="lock-btn" data-dial="genRotation" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Tension</label>
            <input type="range" id="genTension" min="0" max="100" value="0">
            <span class="val" id="genTensionVal">0</span>
            <button class="lock-btn" data-dial="genTension" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Density</label>
            <input type="range" id="genDensity" min="0" max="100" value="50">
            <span class="val" id="genDensityVal">50</span>
            <button class="lock-btn" data-dial="genDensity" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Spiral</label>
            <input type="range" id="genSpiral" min="0" max="100" value="0">
            <span class="val" id="genSpiralVal">0</span>
            <button class="lock-btn" data-dial="genSpiral" title="Lock">🔓</button>
          </div>
          <div class="gen-dial">
            <label>Chaos</label>
            <input type="range" id="genChaos" min="0" max="100" value="0">
            <span class="val" id="genChaosVal">0</span>
            <button class="lock-btn" data-dial="genChaos" title="Lock">🔓</button>
          </div>
        </div>
        <div class="section">
          <div class="section-title">Color</div>
          <div class="gen-color-row">
            <label>Stroke</label>
            <input type="color" id="genStrokeColor" value="#C9A84C">
          </div>
          <div class="color-presets" id="genStrokePresets">
            <div class="color-swatch active" style="background:#C9A84C" data-color="#C9A84C"></div>
            <div class="color-swatch" style="background:#7B2FBE" data-color="#7B2FBE"></div>
            <div class="color-swatch" style="background:#ffffff" data-color="#ffffff"></div>
            <div class="color-swatch" style="background:#2FBEC9" data-color="#2FBEC9"></div>
            <div class="color-swatch" style="background:#e05555" data-color="#e05555"></div>
          </div>
          <div class="gen-color-row" style="margin-top:10px">
            <label>Weight</label>
            <input type="range" id="genStrokeWeight" min="0.5" max="5" value="1" step="0.25" style="flex:1">
            <span class="val" id="genStrokeWeightVal">1</span>
          </div>
        </div>
        <div class="section">
          <div class="btn-row gen-randomize">
            <button class="btn btn-gold" id="genRandomize">🎲 Randomize All</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-outline" id="genToLayers">→ Send to Layers</button>
          </div>
        </div>
      </div>

      <!-- LAYERS TAB -->
      <div class="tab-content" id="tab-layers">
        <div class="section">
          <div class="section-title">Layers</div>
          <div class="layers-list" id="layersList"></div>
          <div class="btn-row">
            <button class="btn btn-gold" id="addLayerBtn">+ Add Layer</button>
            <button class="btn btn-danger" id="deleteLayerBtn">Delete</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-outline" id="moveUpBtn">↑ Up</button>
            <button class="btn btn-outline" id="moveDownBtn">↓ Down</button>
            <button class="btn btn-outline" id="dupeLayerBtn">⧉ Dupe</button>
          </div>
        </div>
      </div>

      <!-- PRESETS TAB -->
      <div class="tab-content" id="tab-presets">
        <div class="section">
          <div class="section-title">Built-in Presets</div>
          <div class="presets-grid" id="presetsGrid"></div>
        </div>
        <div class="section">
          <div class="section-title">Custom Presets</div>
          <div class="presets-grid" id="customPresetsGrid"></div>
          <div class="btn-row">
            <button class="btn btn-gold" id="savePresetBtn">Save Current</button>
            <button class="btn btn-outline" id="clearPresetsBtn">Clear All</button>
          </div>
        </div>
      </div>

      <!-- EXPORT TAB -->
      <div class="tab-content" id="tab-export">
        <div class="section">
          <div class="section-title">Export</div>
          <div class="export-grid">
            <button class="btn btn-gold" id="exportSVG">⬇ SVG</button>
            <button class="btn btn-gold" id="exportPNG">⬇ PNG</button>
            <button class="btn btn-outline" id="exportCSS">Copy CSS BG</button>
            <button class="btn btn-outline" id="exportJSON">⬇ JSON</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ─── State ───
const state = {
  layers: [],
  selectedId: null,
  mode: 'canvas',
  nextId: 1,
  generateActive: false
};

function defaultLayer(shape='circle') {
  return {
    id: state.nextId++,
    shape,
    sides: 6,
    symmetry: 1,
    radius: 150,
    rotation: 0,
    strokeWeight: 1.5,
    strokeColor: '#C9A84C',
    fill: false,
    fillColor: '#C9A84C',
    opacity: 1,
    visible: true
  };
}

state.layers.push(defaultLayer());
state.selectedId = state.layers[0].id;

// ─── DOM refs ───
const svgEl = document.getElementById('mainCanvas');
const svgLayers = document.getElementById('svgLayers');
const svgGenLayer = document.getElementById('svgGenLayer');
const modeLabel = document.getElementById('modeLabel');
const canvasWrap = document.getElementById('canvasWrap');

// ─── Tabs ───
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    state.generateActive = (t.dataset.tab === 'generate');
    if (state.generateActive) {
      modeLabel.textContent = '⚡ Generate';
      renderGenerate();
    } else {
      modeLabel.textContent = state.mode === 'canvas' ? 'Canvas' : 'Tile';
      svgGenLayer.innerHTML = '';
      render();
    }
  });
});

// ─── Shape selector ───
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const layer = sel();
    if (!layer) return;
    layer.shape = btn.dataset.shape;
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateSidesVisibility();
    render();
  });
});

function updateSidesVisibility() {
  const layer = sel();
  const show = layer && (layer.shape === 'polygon' || layer.shape === 'star');
  document.getElementById('sidesSection').style.display = show ? '' : 'none';
}

// ─── Controls binding ───
function sel() { return state.layers.find(l => l.id === state.selectedId); }

function bindSlider(id, prop, fmt) {
  const input = document.getElementById(id);
  const val = document.getElementById(id + 'Val');
  input.addEventListener('input', () => {
    const layer = sel();
    if (!layer) return;
    layer[prop] = parseFloat(input.value);
    val.textContent = fmt ? fmt(input.value) : input.value;
    render();
  });
}

// ─── SVG Shape Generators ───
const CX = 400, CY = 400;

function polygonPoints(cx, cy, r, n, rot=0) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) - Math.PI/2 + (rot * Math.PI / 180);
    pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
  }
  return pts;
}

function starPoints(cx, cy, r, n, rot=0) {
  const pts = [];
  const inner = r * 0.4;
  for (let i = 0; i < n * 2; i++) {
    const a = (Math.PI * 2 * i / (n*2)) - Math.PI/2 + (rot * Math.PI / 180);
    const rad = i % 2 === 0 ? r : inner;
    pts.push([cx + rad * Math.cos(a), cy + rad * Math.sin(a)]);
  }
  return pts;
}

function createShapeSVG(layer, cx, cy) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const s = layer;
  const fill = s.fill ? s.fillColor : 'none';
  const stroke = s.strokeColor;
  const sw = s.strokeWeight;

  function makeEl(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  if (s.shape === 'circle') {
    g.appendChild(makeEl('circle', {cx, cy, r: s.radius, fill, stroke, 'stroke-width': sw}));
  }
  else if (s.shape === 'polygon') {
    const pts = polygonPoints(cx, cy, s.radius, s.sides, s.rotation);
    g.appendChild(makeEl('polygon', {points: pts.map(p=>p.join(',')).join(' '), fill, stroke, 'stroke-width': sw}));
  }
  else if (s.shape === 'star') {
    const pts = starPoints(cx, cy, s.radius, s.sides, s.rotation);
    g.appendChild(makeEl('polygon', {points: pts.map(p=>p.join(',')).join(' '), fill, stroke, 'stroke-width': sw}));
  }
  else if (s.shape === 'line') {
    const a = s.rotation * Math.PI / 180;
    g.appendChild(makeEl('line', {
      x1: cx - s.radius * Math.cos(a), y1: cy - s.radius * Math.sin(a),
      x2: cx + s.radius * Math.cos(a), y2: cy + s.radius * Math.sin(a),
      stroke, 'stroke-width': sw
    }));
  }
  else if (s.shape === 'flower') {
    const r = s.radius / 3;
    g.appendChild(makeEl('circle', {cx, cy, r, fill, stroke, 'stroke-width': sw}));
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 * i / 6 + (s.rotation * Math.PI / 180);
      g.appendChild(makeEl('circle', {
        cx: cx + r * Math.cos(a), cy: cy + r * Math.sin(a), r, fill, stroke, 'stroke-width': sw
      }));
    }
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 * i / 6 + (s.rotation * Math.PI / 180);
      g.appendChild(makeEl('circle', {
        cx: cx + r*2 * Math.cos(a), cy: cy + r*2 * Math.sin(a), r, fill, stroke, 'stroke-width': sw
      }));
    }
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 * i / 6 + Math.PI/6 + (s.rotation * Math.PI / 180);
      g.appendChild(makeEl('circle', {
        cx: cx + r*Math.sqrt(3) * Math.cos(a), cy: cy + r*Math.sqrt(3) * Math.sin(a), r, fill, stroke, 'stroke-width': sw
      }));
    }
    g.appendChild(makeEl('circle', {cx, cy, r: s.radius, fill: 'none', stroke, 'stroke-width': sw}));
  }
  else if (s.shape === 'metatron') {
    const r = s.radius / 4;
    const nodes = [[cx, cy]];
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 * i / 6 + (s.rotation * Math.PI / 180);
      nodes.push([cx + s.radius*0.4*Math.cos(a), cy + s.radius*0.4*Math.sin(a)]);
    }
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 * i / 6 + (s.rotation * Math.PI / 180);
      nodes.push([cx + s.radius*0.8*Math.cos(a), cy + s.radius*0.8*Math.sin(a)]);
    }
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        g.appendChild(makeEl('line', {
          x1: nodes[i][0], y1: nodes[i][1], x2: nodes[j][0], y2: nodes[j][1],
          stroke, 'stroke-width': sw * 0.5, opacity: 0.4
        }));
      }
    }
    nodes.forEach(n => {
      g.appendChild(makeEl('circle', {cx: n[0], cy: n[1], r, fill, stroke, 'stroke-width': sw}));
    });
    g.appendChild(makeEl('circle', {cx, cy, r: s.radius, fill: 'none', stroke, 'stroke-width': sw}));
  }

  return g;
}

// ─── Render (layer mode) ───
function render() {
  if (state.generateActive) return;
  svgLayers.innerHTML = '';
  svgGenLayer.innerHTML = '';

  if (state.mode === 'tile') {
    svgEl.setAttribute('viewBox', '0 0 2400 2400');
    for (let tx = 0; tx < 3; tx++) {
      for (let ty = 0; ty < 3; ty++) {
        renderComposition(tx * 800 + CX, ty * 800 + CY);
      }
    }
  } else {
    svgEl.setAttribute('viewBox', '0 0 800 800');
    renderComposition(CX, CY);
  }
}

function renderComposition(cx, cy) {
  state.layers.forEach(layer => {
    if (!layer.visible) return;
    const sym = layer.symmetry;
    const layerG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    layerG.setAttribute('opacity', layer.opacity);

    if (sym <= 1) {
      layerG.appendChild(createShapeSVG(layer, cx, cy));
    } else {
      for (let i = 0; i < sym; i++) {
        const angle = (360 / sym) * i;
        const symG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        symG.setAttribute('transform', `rotate(${angle} ${cx} ${cy})`);
        symG.appendChild(createShapeSVG(layer, cx, cy));
        layerG.appendChild(symG);
      }
    }
    svgLayers.appendChild(layerG);
  });
}

// ═══════════════════════════════════════════════
// ─── GENERATIVE ENGINE (v1.2) ───
// ═══════════════════════════════════════════════

const PHI = (1 + Math.sqrt(5)) / 2; // Golden ratio

const genState = {
  symmetry: 6,
  complexity: 3,
  frequency: 4,
  radius: 200,
  rotation: 0,
  tension: 0,
  density: 50,
  spiral: 0,
  chaos: 0,
  strokeColor: '#C9A84C',
  strokeWeight: 1,
  locks: {}
};

// Seeded PRNG for reproducible chaos
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function makeEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// The core generative render function
function renderGenerate() {
  svgLayers.innerHTML = '';
  svgGenLayer.innerHTML = '';
  svgEl.setAttribute('viewBox', '0 0 800 800');

  const g = genState;
  const cx = CX, cy = CY;
  const sym = g.symmetry;
  const comp = g.complexity;
  const freq = g.frequency;
  const rad = g.radius;
  const rot = g.rotation * Math.PI / 180;
  const tension = g.tension / 100;
  const density = g.density / 100;
  const spiral = g.spiral / 100;
  const chaos = g.chaos / 100;
  const stroke = g.strokeColor;
  const sw = g.strokeWeight;

  // Seeded random based on current chaos + a fixed seed so patterns are repeatable per-frame
  const rng = mulberry32(Math.floor(chaos * 10000) + sym * 100 + comp * 10 + freq);

  const masterG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  masterG.setAttribute('transform', `rotate(${g.rotation} ${cx} ${cy})`);

  // Helper: add chaos jitter to a point
  function jitter(x, y, amount) {
    if (amount <= 0) return [x, y];
    const jx = (rng() - 0.5) * amount * rad * 0.08;
    const jy = (rng() - 0.5) * amount * rad * 0.08;
    return [x + jx, y + jy];
  }

  // Helper: get point on optional golden spiral offset
  function spiralOffset(baseR, angle, ringIdx) {
    if (spiral <= 0) return baseR;
    // Golden spiral: r grows by PHI per quarter turn
    const spiralR = baseR * (1 + spiral * 0.3 * Math.log(1 + ringIdx * 0.5));
    const spiralAngleOffset = spiral * ringIdx * (Math.PI / (sym * PHI));
    return { r: spiralR, angleOff: spiralAngleOffset };
  }

  // Number of rings based on density & complexity
  const numRings = Math.max(1, Math.round(comp * (0.5 + density * 0.8)));

  for (let ring = 0; ring < numRings; ring++) {
    const t = numRings === 1 ? 1 : ring / (numRings - 1); // 0→1
    const ringR = rad * (0.15 + t * 0.85);
    const sp = spiralOffset(ringR, 0, ring);
    const actualR = typeof sp === 'object' ? sp.r : ringR;
    const angleOff = typeof sp === 'object' ? sp.angleOff : 0;

    // Opacity fades outward slightly
    const ringOpacity = 1 - t * 0.3;

    // Each ring draws shapes at symmetry-spaced points
    const elementsPerSlice = Math.max(1, Math.round(freq * (0.3 + density * 0.7)));

    for (let s = 0; s < sym; s++) {
      const baseAngle = (Math.PI * 2 * s / sym) + angleOff;

      for (let e = 0; e < elementsPerSlice; e++) {
        const et = elementsPerSlice === 1 ? 0.5 : e / (elementsPerSlice - 1);
        const subR = actualR * (0.3 + et * 0.7);
        const subAngle = baseAngle + (et - 0.5) * (Math.PI / sym) * (0.3 + density * 0.7);

        const px = cx + subR * Math.cos(subAngle);
        const py = cy + subR * Math.sin(subAngle);
        const [jx, jy] = jitter(px, py, chaos);

        // Size decreases with sub-elements, increases with complexity
        const elemSize = (rad / (4 + comp)) * (1 - et * 0.5) * (0.5 + density * 0.5);

        // Decide what to draw based on complexity layer
        const layerType = (ring + e) % Math.max(comp, 1);

        if (layerType === 0 || comp <= 2) {
          // Circles — core geometry
          if (tension > 0) {
            // Morphing circles into polygons via tension
            const sides = Math.max(3, Math.round(3 + (1 - tension) * 20));
            const pts = [];
            for (let i = 0; i <= sides; i++) {
              const a = Math.PI * 2 * i / sides;
              const cr = elemSize * (1 + chaos * (rng() - 0.5) * 0.15);
              pts.push([jx + cr * Math.cos(a), jy + cr * Math.sin(a)]);
            }
            if (tension > 0.5) {
              // Curved paths
              let d = `M ${pts[0][0]} ${pts[0][1]}`;
              for (let i = 1; i < pts.length; i++) {
                const prev = pts[i-1];
                const curr = pts[i];
                const cpx = (prev[0] + curr[0]) / 2 + (rng() - 0.5) * tension * elemSize * 0.5;
                const cpy = (prev[1] + curr[1]) / 2 + (rng() - 0.5) * tension * elemSize * 0.5;
                d += ` Q ${cpx} ${cpy} ${curr[0]} ${curr[1]}`;
              }
              d += 'Z';
              masterG.appendChild(makeEl('path', {d, fill:'none', stroke, 'stroke-width': sw, opacity: ringOpacity}));
            } else {
              masterG.appendChild(makeEl('polygon', {
                points: pts.map(p => p.join(',')).join(' '),
                fill: 'none', stroke, 'stroke-width': sw, opacity: ringOpacity
              }));
            }
          } else {
            masterG.appendChild(makeEl('circle', {
              cx: jx, cy: jy, r: elemSize,
              fill: 'none', stroke, 'stroke-width': sw, opacity: ringOpacity
            }));
          }
        }
        else if (layerType === 1) {
          // Radial lines from center to point
          const [lx1, ly1] = jitter(cx, cy, chaos * 0.3);
          if (tension > 0.3) {
            // Curved line
            const midX = (lx1 + jx) / 2 + (rng() - 0.5) * tension * rad * 0.15;
            const midY = (ly1 + jy) / 2 + (rng() - 0.5) * tension * rad * 0.15;
            masterG.appendChild(makeEl('path', {
              d: `M ${lx1} ${ly1} Q ${midX} ${midY} ${jx} ${jy}`,
              fill: 'none', stroke, 'stroke-width': sw * 0.7, opacity: ringOpacity * 0.6
            }));
          } else {
            masterG.appendChild(makeEl('line', {
              x1: lx1, y1: ly1, x2: jx, y2: jy,
              stroke, 'stroke-width': sw * 0.7, opacity: ringOpacity * 0.6
            }));
          }
        }
        else if (layerType === 2) {
          // Polygons
          const sides = Math.max(3, Math.min(sym, 3 + ring));
          const pts = [];
          for (let i = 0; i < sides; i++) {
            const a = Math.PI * 2 * i / sides + subAngle;
            const pr = elemSize * (1 + chaos * (rng() - 0.5) * 0.2);
            const [ppx, ppy] = jitter(jx + pr * Math.cos(a), jy + pr * Math.sin(a), chaos * 0.3);
            pts.push([ppx, ppy]);
          }
          if (tension > 0.4) {
            let d = `M ${pts[0][0]} ${pts[0][1]}`;
            for (let i = 1; i <= pts.length; i++) {
              const curr = pts[i % pts.length];
              const prev = pts[(i-1) % pts.length];
              const cpx = (prev[0] + curr[0]) / 2 + (rng() - 0.5) * tension * elemSize * 0.6;
              const cpy = (prev[1] + curr[1]) / 2 + (rng() - 0.5) * tension * elemSize * 0.6;
              d += ` Q ${cpx} ${cpy} ${curr[0]} ${curr[1]}`;
            }
            d += 'Z';
            masterG.appendChild(makeEl('path', {d, fill:'none', stroke, 'stroke-width': sw * 0.8, opacity: ringOpacity * 0.8}));
          } else {
            masterG.appendChild(makeEl('polygon', {
              points: pts.map(p => p.join(',')).join(' '),
              fill: 'none', stroke, 'stroke-width': sw * 0.8, opacity: ringOpacity * 0.8
            }));
          }
        }
        else if (layerType === 3) {
          // Dots / small filled circles
          const dotR = elemSize * 0.2 * (0.5 + density);
          masterG.appendChild(makeEl('circle', {
            cx: jx, cy: jy, r: dotR,
            fill: stroke, stroke: 'none', opacity: ringOpacity * 0.7
          }));
        }
        else if (layerType === 4) {
          // Arcs
          const arcR = elemSize * 0.8;
          const startA = subAngle - Math.PI / (sym * 2);
          const endA = subAngle + Math.PI / (sym * 2);
          const [ax1, ay1] = jitter(jx + arcR * Math.cos(startA), jy + arcR * Math.sin(startA), chaos * 0.2);
          const [ax2, ay2] = jitter(jx + arcR * Math.cos(endA), jy + arcR * Math.sin(endA), chaos * 0.2);
          masterG.appendChild(makeEl('path', {
            d: `M ${ax1} ${ay1} A ${arcR} ${arcR} 0 0 1 ${ax2} ${ay2}`,
            fill: 'none', stroke, 'stroke-width': sw * 0.6, opacity: ringOpacity * 0.7
          }));
        }
        else if (layerType === 5) {
          // Connecting lines between adjacent symmetry points
          const nextAngle = (Math.PI * 2 * ((s + 1) % sym) / sym) + angleOff;
          const nx = cx + subR * Math.cos(nextAngle);
          const ny = cy + subR * Math.sin(nextAngle);
          const [njx, njy] = jitter(nx, ny, chaos);
          if (tension > 0.3) {
            const midX = (jx + njx) / 2 + (cy - (jy + njy) / 2) * tension * 0.3;
            const midY = (jy + njy) / 2 + ((jx + njx) / 2 - cx) * tension * 0.3;
            masterG.appendChild(makeEl('path', {
              d: `M ${jx} ${jy} Q ${midX} ${midY} ${njx} ${njy}`,
              fill: 'none', stroke, 'stroke-width': sw * 0.5, opacity: ringOpacity * 0.5
            }));
          } else {
            masterG.appendChild(makeEl('line', {
              x1: jx, y1: jy, x2: njx, y2: njy,
              stroke, 'stroke-width': sw * 0.5, opacity: ringOpacity * 0.5
            }));
          }
        }
        else if (layerType === 6) {
          // Concentric ring fragments
          masterG.appendChild(makeEl('circle', {
            cx, cy, r: subR,
            fill: 'none', stroke, 'stroke-width': sw * 0.4,
            opacity: ringOpacity * 0.25,
            'stroke-dasharray': `${elemSize * 0.5} ${elemSize * 2}`
          }));
        }
        else {
          // Stars
          const starSides = Math.max(3, Math.min(8, sym - 2));
          const pts = [];
          for (let i = 0; i < starSides * 2; i++) {
            const a = Math.PI * 2 * i / (starSides * 2) + subAngle;
            const sr = i % 2 === 0 ? elemSize : elemSize * 0.4;
            pts.push([jx + sr * Math.cos(a), jy + sr * Math.sin(a)]);
          }
          masterG.appendChild(makeEl('polygon', {
            points: pts.map(p => p.join(',')).join(' '),
            fill: 'none', stroke, 'stroke-width': sw * 0.7, opacity: ringOpacity * 0.8
          }));
        }
      }
    }

    // Optional: ring circle for structure (when density is high enough)
    if (density > 0.4 && ring % 2 === 0) {
      masterG.appendChild(makeEl('circle', {
        cx, cy, r: actualR,
        fill: 'none', stroke, 'stroke-width': sw * 0.3,
        opacity: ringOpacity * 0.2 * density,
        'stroke-dasharray': tension > 0.5 ? `${4 + tension * 10} ${8 + tension * 5}` : 'none'
      }));
    }
  }

  // Outer boundary circle
  masterG.appendChild(makeEl('circle', {
    cx, cy, r: rad,
    fill: 'none', stroke, 'stroke-width': sw, opacity: 0.6
  }));

  // Center dot
  masterG.appendChild(makeEl('circle', {
    cx, cy, r: sw * 2,
    fill: stroke, stroke: 'none', opacity: 0.8
  }));

  svgGenLayer.appendChild(masterG);
}

genDials.forEach(d => {
  const input = document.getElementById(d.id);
  const val = document.getElementById(d.id + 'Val');
  input.addEventListener('input', () => {
    genState[d.prop] = parseFloat(input.value);
    val.textContent = d.fmt ? d.fmt(input.value) : input.value;
    if (state.generateActive) renderGenerate();
  });
});

// Gen stroke color
document.getElementById('genStrokeColor').addEventListener('input', e => {
  genState.strokeColor = e.target.value;
  document.querySelectorAll('#genStrokePresets .color-swatch').forEach(s => s.classList.remove('active'));
  if (state.generateActive) renderGenerate();
});

document.querySelectorAll('#genStrokePresets .color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    genState.strokeColor = sw.dataset.color;
    document.getElementById('genStrokeColor').value = sw.dataset.color;
    document.querySelectorAll('#genStrokePresets .color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    if (state.generateActive) renderGenerate();
  });
});

// Gen stroke weight
document.getElementById('genStrokeWeight').addEventListener('input', function() {
  genState.strokeWeight = parseFloat(this.value);
  document.getElementById('genStrokeWeightVal').textContent = this.value;
  if (state.generateActive) renderGenerate();
});

// Lock buttons
document.querySelectorAll('.lock-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const dial = btn.dataset.dial;
    genState.locks[dial] = !genState.locks[dial];
    btn.classList.toggle('locked', genState.locks[dial]);
    btn.textContent = genState.locks[dial] ? '🔒' : '🔓';
  });
});

// Randomize All
document.getElementById('genRandomize').addEventListener('click', () => {
  const ranges = {
    genSymmetry: [2, 24],
    genComplexity: [1, 8],
    genFrequency: [1, 12],
    genRadius: [80, 350],
    genRotation: [0, 360],
    genTension: [0, 100],
    genDensity: [10, 100],
    genSpiral: [0, 100],
    genChaos: [0, 60]
  };

  genDials.forEach(d => {
    if (genState.locks[d.id]) return;
    const [min, max] = ranges[d.id];
    const input = document.getElementById(d.id);
    const step = parseFloat(input.step) || 1;
    let val = min + Math.random() * (max - min);
    val = Math.round(val / step) * step;
    val = Math.max(min, Math.min(max, val));
    input.value = val;
    genState[d.prop] = val;
    document.getElementById(d.id + 'Val').textContent = d.fmt ? d.fmt(val) : val;
  });

  // Randomize color too (unless user set it)
  const colors = ['#C9A84C', '#7B2FBE', '#ffffff', '#2FBEC9', '#e05555', '#ff6b35', '#44cc88', '#ff44aa'];
  genState.strokeColor = colors[Math.floor(Math.random() * colors.length)];
  document.getElementById('genStrokeColor').value = genState.strokeColor;
  document.querySelectorAll('#genStrokePresets .color-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === genState.strokeColor);
  });

  if (state.generateActive) renderGenerate();
});

// Send to Layers — converts the generative SVG into a layer snapshot
document.getElementById('genToLayers').addEventListener('click', () => {
  // We convert the generative output into a "frozen" layer
  // by capturing the SVG and injecting it as a custom layer
  const svgContent = svgGenLayer.innerHTML;
  if (!svgContent) return;

  // Create a generic layer with the generative params as metadata
  const layer = defaultLayer('circle');
  layer.shape = 'circle';
  layer.symmetry = genState.symmetry;
  layer.radius = genState.radius;
  layer.rotation = genState.rotation;
  layer.strokeColor = genState.strokeColor;
  layer.strokeWeight = genState.strokeWeight;
  state.layers.push(layer);

  // Switch to layers tab
  state.generateActive = false;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  document.querySelector('[data-tab="layers"]').classList.add('active');
  document.getElementById('tab-layers').classList.add('active');
  modeLabel.textContent = state.mode === 'canvas' ? 'Canvas' : 'Tile';
  svgGenLayer.innerHTML = '';

  selectLayer(layer.id);
  render();
});

function loadPreset(preset) {
  state.layers = [];
  state.nextId = 1;
  preset.layers.forEach(l => {
    const layer = {...defaultLayer(l.shape), ...l, id: state.nextId++, visible: true};
    state.layers.push(layer);
  });
  selectLayer(state.layers[0].id);
  render();
}

  btn.className = 'preset-btn';
  btn.textContent = p.name;
  btn.addEventListener('click', () => loadPreset(p));
  presetsGrid.appendChild(btn);
});

function loadCustomPresets() {
  const grid = document.getElementById('customPresetsGrid');
  grid.innerHTML = '';
  const customs = JSON.parse(localStorage.getItem('geo-presets') || '[]');
  customs.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.name;
    btn.addEventListener('click', () => loadPreset(p));
    grid.appendChild(btn);
  });
}

document.getElementById('savePresetBtn').addEventListener('click', () => {

  if (!name) return;
  const customs = JSON.parse(localStorage.getItem('geo-presets') || '[]');
  customs.push({name, layers: state.layers.map(l => {
    const {id, visible, ...rest} = l;
    return rest;
  })});
  localStorage.setItem('geo-presets', JSON.stringify(customs));
  loadCustomPresets();
});

document.getElementById('clearPresetsBtn').addEventListener('click', () => {

    localStorage.removeItem('geo-presets');
    loadCustomPresets();
  }
});

// ─── Export ───
function getSVGString() {
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('viewBox', '0 0 800 800');
  return new XMLSerializer().serializeToString(clone);
}

document.getElementById('exportSVG').addEventListener('click', () => {
  const saved = state.mode;
  const savedGen = state.generateActive;
  if (!savedGen) { state.mode = 'canvas'; render(); }
  const svg = getSVGString();
  if (!savedGen) { state.mode = saved; render(); }
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sacred-geometry.svg';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('exportPNG').addEventListener('click', () => {
  const saved = state.mode;
  const savedGen = state.generateActive;
  if (!savedGen) { state.mode = 'canvas'; render(); }
  const svg = getSVGString();
  if (!savedGen) { state.mode = saved; render(); }
  const canvas = document.createElement('canvas');
  canvas.width = 800; canvas.height = 800;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, 800, 800);
    ctx.drawImage(img, 0, 0, 800, 800);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'sacred-geometry.png';
    a.click();
  };
  img.src = url;
});

document.getElementById('exportCSS').addEventListener('click', () => {
  const saved = state.mode;
  const savedGen = state.generateActive;
  if (!savedGen) { state.mode = 'canvas'; render(); }
  const svg = getSVGString();
  if (!savedGen) { state.mode = saved; render(); }
  const encoded = btoa(unescape(encodeURIComponent(svg)));
  const css = `background-image: url("data:image/svg+xml;base64,${encoded}");\nbackground-repeat: repeat;\nbackground-size: 200px 200px;`;
  navigator.clipboard.writeText(css).then(() => alert('CSS copied to clipboard!')).catch(() => {
    prompt('Copy this CSS:', css);
  });
});

document.getElementById('exportJSON').addEventListener('click', () => {
  const data = JSON.stringify({
    layers: state.layers.map(l => {const {id,visible,...r}=l;return r;}),
    generate: state.generateActive ? genState : null
  }, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sacred-geometry.json';
  a.click();
  URL.revokeObjectURL(a.href);
});
