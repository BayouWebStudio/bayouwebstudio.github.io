<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks! - Cory Salls Tattoos</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .thanks-card {
            max-width: 520px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
        }
        .thanks-icon { font-size: 60px; margin-bottom: 20px; }
        .thanks-card h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 36px; 
            color: var(--primary); 
            margin-bottom: 16px; 
        }
        .thanks-card p { color: var(--text-muted); font-size: 18px; line-height: 1.6; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="thanks-page">
        <div class="thanks-card">
            <div class="thanks-icon">✍🏻</div>
            <h1>You're on the radar.</h1>
            <p>Thanks for reaching out. Cory will be in touch soon — keep an eye on your inbox and DMs.</p>
            <p>In the meantime, follow <a href="https://www.instagram.com/cory_salls/" target="_blank" style="color: var(--primary);">@cory_salls</a> for the latest work.</p>
            <div style="margin-top: 32px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <a href="/" class="btn btn-secondary">← Back to Site</a>
                <a href="https://www.instagram.com/cory_salls/" class="btn btn-primary" target="_blank">Follow on IG</a>
            </div>
        </div>
    </div>
</body>
</html>
