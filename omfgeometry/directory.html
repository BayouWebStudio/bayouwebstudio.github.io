<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Directory — OMF Geometry</title>
  <meta name="description" content="Browse geometric tattoo artists worldwide. Filter by country, style, and technique.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">OMF<span>GEOMETRY</span></a>
    <button class="nav-toggle" aria-label="Menu">☰</button>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="directory.html" class="active">Directory</a></li>
      <li><a href="blog/">Blog</a></li>
      <li><a href="submit.html">Submit Artist</a></li>
    </ul>
  </div>
</nav>

<section class="section" style="padding-top: 140px;">
  <div class="container">
    <div class="section-header">
      <h2>Artist Directory</h2>
      <p>Explore geometric tattoo artists from around the world</p>
      <div class="section-divider"></div>
    </div>

    <div class="filter-bar">
      <label>Filter:</label>
      <select id="filter-country" class="filter-select">
        <option value="">All Countries</option>
      </select>
      <select id="filter-style" class="filter-select">
        <option value="">All Styles</option>
      </select>
    </div>

    <div class="artists-grid" id="artists-container"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-logo">OMF GEOMETRY</div>
    <ul class="footer-links">
      <li><a href="/">Home</a></li>
      <li><a href="directory.html">Directory</a></li>
      <li><a href="blog/">Blog</a></li>
      <li><a href="submit.html">Submit</a></li>
    </ul>
    <a href="https://instagram.com/omfgeometry" target="_blank" class="footer-ig">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      @omfgeometry
    </a>
    <div class="footer-copy">© 2026 OMF Geometry. Built with 🌿 by <a href="https://getminted.ai">GetMinted</a>.</div>
  </div>
</footer>

<script>
// Inline script to bypass CDN caching issues
document.addEventListener('DOMContentLoaded', () => {
  // Directory Filtering
  const countryFilter = document.getElementById('filter-country');
  const styleFilter = document.getElementById('filter-style');
  const artistsContainer = document.getElementById('artists-container');

  if (countryFilter && styleFilter && artistsContainer) {
    let allArtists = [];
    
    // Use raw GitHub URL to bypass CDN cache
    fetch('https://raw.githubusercontent.com/bayouwebstudio/bayouwebstudio.github.io/main/omfgeometry/data/artists.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        allArtists = data;
        populateFilters(data);
        renderArtists(data);
        console.log('Loaded', data.length, 'artists from raw GitHub');
      })
      .catch(err => {
        console.error('Failed to load artists:', err);
        // Show error message
        artistsContainer.innerHTML = '<p style="text-align: center; color: red;">Failed to load artist directory. Please refresh the page.</p>';
      });

    function populateFilters(artists) {
      const countries = [...new Set(artists.map(a => a.country))].sort();
      const styles = [...new Set(artists.flatMap(a => a.styles))].sort();

      countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        countryFilter.appendChild(opt);
      });

      styles.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
        styleFilter.appendChild(opt);
      });
    }

    function renderArtists(artists) {
      artistsContainer.innerHTML = artists.map(a => `
        <a href="artists/${a.slug}.html" class="artist-card">
          <img src="${a.image}" alt="${a.name}" class="artist-card-image" loading="lazy">
          <div class="artist-card-body">
            <div class="artist-card-name">${a.name}</div>
            <div class="artist-card-handle">@${a.instagram}</div>
            <div class="artist-card-location">📍 ${a.location}</div>
            <div class="artist-card-tags">
              ${a.styles.map(s => `<span class="tag">${s}</span>`).join('')}
            </div>
          </div>
        </a>
      `).join('');
    }

    function applyFilters() {
      const country = countryFilter.value;
      const style = styleFilter.value;
      let filtered = allArtists;
      if (country) filtered = filtered.filter(a => a.country === country);
      if (style) filtered = filtered.filter(a => a.styles.includes(style));
      renderArtists(filtered);
    }

    countryFilter.addEventListener('change', applyFilters);
    styleFilter.addEventListener('change', applyFilters);
  }

  // Mobile Nav Toggle (keep this from main.js)
  const toggle = document.querySelector('.nav-toggle');
  const links = document.querySelector('.nav-links');
  if (toggle && links) {
    toggle.addEventListener('click', () => {
      links.classList.toggle('open');
      toggle.textContent = links.classList.contains('open') ? '✕' : '☰';
    });
  }

  // Scroll animations (keep this from main.js)
  const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, observerOptions);

  document.querySelectorAll('.artist-card, .blog-card, .newsletter').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(20px)';
    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    observer.observe(el);
  });
});
</script>
</body>
</html>
